<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Bereken-tool • Cruisin Craftsmen</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #1e1e1e; color: #FEFEF3; }
    header { text-align: center; padding: 2rem 1rem 1rem; }
    .logo { max-width: 400px; margin-bottom: 1rem;}
    .wrap { max-width: 960px; margin: 0 auto; padding: 1rem; }
    .card { background: #2a2a2a; border: 1px solid #444; border-radius: 12px; padding: 1rem; margin-top: 1rem; }
    .grid { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 10px; align-items: center; }
    .head { font-size: .85rem; color: #A82B2D; font-weight: 800; text-transform: uppercase; padding-bottom: 5px; border-bottom: 1px solid #444; margin-bottom: 10px; }
    .price-label { font-size: 0.85rem; color: #bbb; display: block; }
    input[type="number"] { 
      background: #333; color: #FEFEF3; border: 1px solid #555; width: 100%; padding: .6rem; 
      font-size: 1rem; border-radius: 6px; box-sizing: border-box; outline: none; -moz-appearance: textfield;
    }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .sub-total-cell { text-align: right; font-weight: 700; color: #FEFEF3; font-size: 1.1rem; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: .8rem 1.2rem; font-weight: 700; margin-top: 1rem; }
    .primary { background: #A82B2D; color: #FEFEF3; width: 100%; }
    .ghost { background: #444; color: #FEFEF3; }
    #disp-sum-total { font-size: 2.5rem; color: #A82B2D; font-weight: 900; margin: 1rem 0; text-align: center;}
    #login-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; }
    .login-card { background: #2a2a2a; padding: 2rem; border-radius: 12px; border: 1px solid #A82B2D; width: 320px; text-align: center; }
    .login-card input { margin-bottom: 15px; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; border-radius: 6px; }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Cruisin Craftsmen" class="logo">
  <h1>Mechanic Berekentool</h1>
</header>

<div class="wrap">
  <section class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
      <h2 style="margin:0;">Aankoop</h2>
      <label style="font-size: 0.8rem; color:#bbb;"><input type="checkbox" id="approve-extra"> Manager Accoord</label>
    </div>
    <div class="grid" id="container-aankoop">Verbinding maken met database...</div>
  </section>

  <section class="card">
    <h2 style="margin-bottom: 1rem;">Recycling</h2>
    <div class="grid" id="container-recycling">Verbinding maken met database...</div>
  </section>

  <section class="card">
    <div style="text-align:center;">
        <div style="font-size: 0.9rem; color:#bbb; text-transform:uppercase; letter-spacing:1px;">Totaal Uitbetalen</div>
        <div id="disp-sum-total">€ 0</div>
        <div style="display:flex; gap:10px;">
          <button class="ghost" style="flex:1;" id="btn-copy-total">📋 Kopiëren</button>
          <button class="ghost" style="flex:1;" onclick="location.reload()">🔄 Wissen</button>
        </div>
    </div>
  </section>

  <div style="text-align:center; margin-top: 3rem;">
    <button class="ghost" onclick="toggleLogin(true)" style="font-size:0.7rem; opacity:0.4;">🛠️ BEHEERDER LOGIN</button>
  </div>

  <section class="card" id="admin-panel" style="display:none; border: 2px solid #A82B2D;">
    <h2>⚙️ Prijzen Aanpassen (Live)</h2>
    <div id="price-edit-grid" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
    <button class="primary" id="btn-save-prices">💾 Prijzen Opslaan voor Team</button>
  </section>
</div>

<div id="login-overlay">
  <div class="login-card">
    <h3>Beheer</h3>
    <input type="text" id="user-login" placeholder="Gebruikersnaam">
    <input type="password" id="pass-login" placeholder="Wachtwoord">
    <button class="primary" id="btn-auth">Inloggen</button>
    <button class="ghost" onclick="toggleLogin(false)" style="width:100%;">Sluiten</button>
  </div>
</div>

<script>
// --- EXACTE GEGEVENS VAN JOUW SCREENSHOT ---
const firebaseConfig = {
  apiKey: "AIzaSyBpCPp95sTmIokd4qQxARKAWxFJnKF6Efo",
  authDomain: "cruisin-craftsmen.firebaseapp.com",
  databaseURL: "https://cruisin-craftsmen-default-rtdb.europe-west1.firebasedatabase.app", // NU ZONDER -6430b
  projectId: "cruisin-craftsmen",
  storageBucket: "cruisin-craftsmen.firebasestorage.app",
  messagingSenderId: "169024473632",
  appId: "1:169024473632:web:628511fc7fafbbe6df8a45"
};
// Initialiseer Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const LABELS = { ijzer:"Ijzer", staal:"Staal", aluminium:"Aluminium", carparts:"Car parts", craftparts:"Craft parts", elektronischschroot:"Elek. Schroot", metaalschroot:"Metaalschroot", rubber:"Rubber", plastic:"Plastic", glas:"Glas", koper:"Koper", banden:"Banden", blikjes:"Blikjes", telefoons:"Telefoons", radios:"Radio's" };
const RESTRICTED = ["plastic", "glas", "koper", "elektronischschroot"];
let PRICES = {};

// Haal prijzen op
db.ref('prices').on('value', (snap) => {
    PRICES = snap.val();
    if (!PRICES) {
        // Eerste keer vullen als database leeg is
        PRICES = {
            aankoop: { ijzer:20, staal:20, aluminium:10, carparts:25, metaalschroot:20, rubber:20, craftparts:25, elektronischschroot:10, plastic:10, glas:10, koper:10 },
            recycling: { banden:10, blikjes:10, telefoons:10, radios:10 }
        };
        db.ref('prices').set(PRICES);
    }
    renderUI();
}, (error) => {
    console.error("Firebase fout:", error);
    alert("Geen toegang tot database! Check je Firebase Rules.");
});

function renderUI() {
    ['aankoop', 'recycling'].forEach(sec => {
        const cont = document.getElementById(`container-${sec}`);
        let html = `<div class="head">Item</div><div class="head">Aantal</div><div class="head" style="text-align:right;">Totaal</div>`;
        for (let id in PRICES[sec]) {
            html += `
                <div><strong>${LABELS[id]}</strong><span class="price-label">€${PRICES[sec][id]}/st</span></div>
                <div><input id="${id}" type="number" placeholder="0" oninput="updateSums()" ${RESTRICTED.includes(id) && !document.getElementById('approve-extra').checked ? 'disabled' : ''}></div>
                <div class="sub-total-cell" id="sub-${id}">€ 0</div>`;
        }
        cont.innerHTML = html;
    });
}

function updateSums() {
    let grandTotal = 0;
    for (let sec in PRICES) {
        for (let id in PRICES[sec]) {
            const el = document.getElementById(id);
            if(el) {
                const qty = parseInt(el.value) || 0;
                const sub = qty * PRICES[sec][id];
                document.getElementById(`sub-${id}`).textContent = "€ " + sub.toLocaleString('nl-NL');
                grandTotal += sub;
            }
        }
    }
    document.getElementById('disp-sum-total').textContent = "€ " + grandTotal.toLocaleString('nl-NL');
}

document.addEventListener('change', (e) => {
  if (e.target.id === 'approve-extra') {
    RESTRICTED.forEach(id => {
      const inp = document.getElementById(id);
      if(inp) {
        inp.disabled = !e.target.checked;
        if(!e.target.checked) { inp.value = ""; updateSums(); }
      }
    });
  }
});

function toggleLogin(s) { document.getElementById('login-overlay').style.display = s ? 'flex' : 'none'; }

document.getElementById('btn-auth').onclick = () => {
    if (document.getElementById('user-login').value === "admin" && document.getElementById('pass-login').value === "sletco") {
        toggleLogin(false);
        document.getElementById('admin-panel').style.display = 'block';
        const g = document.getElementById('price-edit-grid');
        g.innerHTML = "";
        for (let sec in PRICES) {
            for (let id in PRICES[sec]) {
                g.innerHTML += `<div style="padding:10px 0;">${LABELS[id]}</div><input type="number" class="adm-in" data-sec="${sec}" data-id="${id}" value="${PRICES[sec][id]}">`;
            }
        }
    } else { alert("Verkeerde login!"); }
};

document.getElementById('btn-save-prices').onclick = () => {
    document.querySelectorAll('.adm-in').forEach(i => {
        PRICES[i.dataset.sec][i.dataset.id] = parseInt(i.value) || 0;
    });
    db.ref('prices').set(PRICES).then(() => {
        alert("Prijzen LIVE aangepast!");
        document.getElementById('admin-panel').style.display = 'none';
    }).catch(err => {
        alert("Fout bij opslaan: " + err.message);
    });
};

document.getElementById('btn-copy-total').onclick = () => {
    const val = document.getElementById('disp-sum-total').textContent.replace(/\D/g, '');
    navigator.clipboard.writeText(val);
    alert("Bedrag gekopieerd!");
};
</script>
</body>
</html>
