<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Bereken-tool • Cruisin Craftsmen</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #121212; color: #FEFEF3; }
    header { text-align: center; padding: 2rem 1rem 1rem; }
    .logo { max-width: 350px; margin-bottom: 1rem;}
    .wrap { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 12px; align-items: center; }
    .head { font-size: .8rem; color: #A82B2D; font-weight: 800; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid #333; margin-bottom: 10px; }
    .price-label { font-size: 0.8rem; color: #888; display: block; }
    
    /* --- WIT LICHTEFFECT OP INPUTS --- */
    input[type="number"] { 
      background: #252525; color: #FEFEF3; border: 2px solid #444; width: 100%; padding: .7rem; 
      font-size: 1.1rem; border-radius: 8px; box-sizing: border-box; outline: none;
      transition: all 0.25s ease-in-out;
    }

    /* Oplichten wanneer het veld actief is (Wit) */
    input[type="number"]:not(:disabled) {
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    }

    /* Extra fel wit bij typen */
    input[type="number"]:focus {
      border-color: #ffffff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      background: #2a2a2a;
    }

    /* Gedoofd effect */
    input[type="number"]:disabled {
      border-color: #333;
      opacity: 0.2;
      cursor: not-allowed;
    }

    .sub-total-cell { text-align: right; font-weight: 800; color: #FEFEF3; font-size: 1.1rem; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: .8rem 1.2rem; font-weight: 700; margin-top: 1rem; transition: 0.2s; }
    .primary { background: #A82B2D; color: #FEFEF3; width: 100%; }
    .ghost { background: #333; color: #FEFEF3; }
    .ghost:hover { background: #444; }
    .danger { background: #222; color: #ff6b6b; border: 1px solid #ff6b6b; width: 100%; margin-top: 10px; }
    #disp-sum-total { font-size: 3rem; color: #A82B2D; font-weight: 900; margin: 1rem 0; text-align: center;}
    #login-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; align-items:center; justify-content:center; }
    .login-card { background: #1e1e1e; padding: 2.5rem; border-radius: 16px; border: 1px solid #A82B2D; width: 340px; text-align: center; }
    
    .manager-divider { grid-column: 1 / span 3; padding: 15px 0 5px; color: #A82B2D; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px dashed #444; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Cruisin Craftsmen" class="logo">
  <h1 style="letter-spacing: -1px; font-weight: 900;">MECHANIC CALCULATOR</h1>
</header>

<div class="wrap">
  <section class="card">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 1.5rem;">
      <h2 style="margin:0;">Aankoop Lijst</h2>
      <label style="background: #252525; padding: 8px 12px; border-radius: 8px; border: 1px solid #A82B2D; color: #FEFEF3; font-size: 0.8rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="approve-extra" style="accent-color: #A82B2D; transform: scale(1.2);"> ⚠️ MANAGER AKKOORD
      </label>
    </div>
    <div class="grid" id="container-aankoop">Laden...</div>
  </section>

  <section class="card">
    <h2 style="margin-bottom: 1rem;">Recycling</h2>
    <div class="grid" id="container-recycling">Laden...</div>
  </section>

  <section class="card">
    <div style="text-align:center;">
        <div style="font-size: 0.8rem; color:#888; text-transform:uppercase; font-weight: bold;">Totaal uitbetalen aan klant</div>
        <div id="disp-sum-total">€ 0</div>
        <div style="display:flex; gap:10px;">
          <button class="ghost" style="flex:1;" id="btn-copy-total">📋 Bedrag Kopiëren</button>
          <button class="ghost" style="flex:1;" onclick="location.reload()">🔄 Alles Wissen</button>
        </div>
    </div>
  </section>

  <div style="text-align:center; margin-top: 2.5rem;">
    <button class="ghost" id="admin-status-btn" onclick="toggleLogin(true)" style="font-size:0.65rem; opacity:0.3; letter-spacing: 1px;">⚙️ ADMIN AUTHENTICATION</button>
  </div>

  <section class="card" id="admin-panel" style="display:none; border: 2px solid #A82B2D;">
    <h2 style="margin-top:0;">Beheerder Paneel</h2>
    <div id="price-edit-grid" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
    <button class="primary" id="btn-save-prices">💾 Prijzen Publiceren</button>
    <button class="danger" onclick="firebase.auth().signOut()">🚪 Uitloggen</button>
  </section>
</div>

<div id="login-overlay">
  <div class="login-card">
    <h3 style="margin-top:0;">Login Vereist</h3>
    <button class="primary" id="btn-auth" style="background:#4285F4; margin-bottom: 10px;">Login met Google</button>
    <button class="ghost" onclick="toggleLogin(false)" style="width:100%;">Terug</button>
  </div>
</div>

<script>
const EMAILJS_PUBLIC_KEY = "rOpe9bOgVCSBWRLXm"; 
const EMAILJS_SERVICE_ID = "service_fgawe2t";       
const EMAILJS_TEMPLATE_ID = "template_zlg3ne7"; 

const firebaseConfig = {
  apiKey: "AIzaSyBpCPp95sTmIokd4qQxARKAWxFJnKF6Efo",
  authDomain: "cruisin-craftsmen.firebaseapp.com",
  databaseURL: "https://cruisin-craftsmen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cruisin-craftsmen",
  storageBucket: "cruisin-craftsmen.firebasestorage.app",
  messagingSenderId: "169024473632",
  appId: "1:169024473632:web:628511fc7fafbbe6df8a45"
};

firebase.initializeApp(firebaseConfig);
emailjs.init(EMAILJS_PUBLIC_KEY);

const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const LABELS = { ijzer:"Ijzer", staal:"Staal", aluminium:"Aluminium", carparts:"Car parts", craftparts:"Craft parts", elektronischschroot:"Elek. Schroot", metaalschroot:"Metaalschroot", rubber:"Rubber", plastic:"Plastic", glas:"Glas", koper:"Koper", banden:"Banden", blikjes:"Blikjes", telefoons:"Telefoons", radios:"Radio's" };
const RESTRICTED = ["plastic", "glas", "koper", "elektronischschroot"];
let PRICES = {};

auth.onAuthStateChanged(user => {
    if (user) {
        const safeEmail = user.email.replace(/\./g, ',');
        db.ref('whitelist/' + safeEmail).on('value', snap => {
            if (snap.exists() && snap.val() === true) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-status-btn').textContent = "✅ ADMIN: " + user.displayName.toUpperCase();
                setupAdminGrid();
            } else {
                document.getElementById('admin-status-btn').textContent = "⏳ WACHT OP AUTORISATIE";
            }
        });
    } else {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('admin-status-btn').textContent = "⚙️ ADMIN AUTHENTICATION";
    }
});

document.getElementById('btn-auth').onclick = () => {
    auth.signInWithPopup(provider).then(result => {
        const safeEmail = result.user.email.replace(/\./g, ',');
        db.ref('whitelist/' + safeEmail).once('value', snap => {
            if (!(snap.exists() && snap.val() === true)) {
                if(confirm("Stuur een aanvraag naar Drijkes voor dit account?")) {
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { user_name: result.user.displayName, user_email: result.user.email });
                }
            }
            toggleLogin(false);
        });
    });
};

db.ref('prices').on('value', snap => {
    PRICES = snap.val() || { aankoop: { ijzer:20 }, recycling: { banden:10 } };
    renderUI();
});

function renderUI() {
    ['aankoop', 'recycling'].forEach(sec => {
        const cont = document.getElementById(`container-${sec}`);
        if(!cont) return;
        let html = `<div class="head">Item</div><div class="head">Aantal</div><div class="head" style="text-align:right;">Totaal</div>`;
        
        // Sorteer: eerst de gewone, dan de restricted
        const keys = Object.keys(PRICES[sec]).sort((a, b) => {
            const aRes = RESTRICTED.includes(a);
            const bRes = RESTRICTED.includes(b);
            return aRes - bRes;
        });

        let hasShownDivider = false;

        keys.forEach(id => {
            if (RESTRICTED.includes(id) && !hasShownDivider && sec === 'aankoop') {
                html += `<div class="manager-divider">Mits goedkeuring Manager</div>`;
                hasShownDivider = true;
            }
            const isDisabled = RESTRICTED.includes(id) && !document.getElementById('approve-extra').checked;
            html += `<div><strong>${LABELS[id] || id}</strong><span class="price-label">€${PRICES[sec][id]}/st</span></div>
                     <div><input id="${id}" type="number" placeholder="0" oninput="updateSums()" ${isDisabled ? 'disabled' : ''}></div>
                     <div class="sub-total-cell" id="sub-${id}">€ 0</div>`;
        });
        cont.innerHTML = html;
    });
    updateSums();
}

function updateSums() {
    let grandTotal = 0;
    for (let sec in PRICES) {
        for (let id in PRICES[sec]) {
            const el = document.getElementById(id);
            if(el) {
                const sub = (parseInt(el.value) || 0) * PRICES[sec][id];
                document.getElementById(`sub-${id}`).textContent = "€ " + sub.toLocaleString('nl-NL');
                grandTotal += sub;
            }
        }
    }
    document.getElementById('disp-sum-total').textContent = "€ " + grandTotal.toLocaleString('nl-NL');
}

function setupAdminGrid() {
    const g = document.getElementById('price-edit-grid');
    g.innerHTML = "";
    for (let sec in PRICES) {
        for (let id in PRICES[sec]) {
            g.innerHTML += `<div style="padding:10px 0;">${LABELS[id] || id}</div><input type="number" class="adm-in" style="border-color:#444;" data-sec="${sec}" data-id="${id}" value="${PRICES[sec][id]}">`;
        }
    }
}

document.getElementById('btn-save-prices').onclick = () => {
    document.querySelectorAll('.adm-in').forEach(i => PRICES[i.dataset.sec][i.dataset.id] = parseInt(i.value) || 0);
    db.ref('prices').set(PRICES).then(() => alert("Prijzen succesvol gepubliceerd naar alle mechanics."));
};

function toggleLogin(s) { document.getElementById('login-overlay').style.display = s ? 'flex' : 'none'; }
document.getElementById('btn-copy-total').onclick = () => {
    const val = document.getElementById('disp-sum-total').textContent.replace('€ ', '').replace('.', '');
    navigator.clipboard.writeText(val);
    alert("Klaar om te plakken!");
};

document.addEventListener('change', (e) => {
  if (e.target.id === 'approve-extra') renderUI();
});
</script>
</body>
</html>
