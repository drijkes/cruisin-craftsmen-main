<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Bereken-tool • Cruisin Craftsmen</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #1e1e1e; color: #FEFEF3; }
    header { text-align: center; padding: 2rem 1rem 1rem; }
    .logo { max-width: 400px; margin-bottom: 1rem;}
    .wrap { max-width: 960px; margin: 0 auto; padding: 1rem; }
    .card { background: #2a2a2a; border: 1px solid #444; border-radius: 12px; padding: 1rem; margin-top: 1rem; }
    .grid { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 10px; align-items: center; }
    .head { font-size: .85rem; color: #A82B2D; font-weight: 800; text-transform: uppercase; padding-bottom: 5px; border-bottom: 1px solid #444; margin-bottom: 10px; }
    .price-label { font-size: 0.85rem; color: #bbb; display: block; }
    
    /* --- LICHTEFFECTEN OP INPUTS --- */
    input[type="number"] { 
      background: #333; color: #FEFEF3; border: 2px solid #555; width: 100%; padding: .6rem; 
      font-size: 1rem; border-radius: 6px; box-sizing: border-box; outline: none;
      transition: all 0.3s ease; /* Zorgt voor een vloeiende overgang */
    }

    /* Oplichten wanneer het veld actief is */
    input[type="number"]:not(:disabled) {
      border-color: #A82B2D;
      box-shadow: 0 0 8px rgba(168, 43, 45, 0.2);
    }

    /* Extra fel oplichten bij focus (als je erin typt) */
    input[type="number"]:focus {
      border-color: #ff3b3e;
      box-shadow: 0 0 15px rgba(168, 43, 45, 0.5);
      background: #444;
    }

    /* Grijs en gedoofd als het veld uitgeschakeld is */
    input[type="number"]:disabled {
      border-color: #444;
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }

    .sub-total-cell { text-align: right; font-weight: 700; color: #FEFEF3; font-size: 1.1rem; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: .8rem 1.2rem; font-weight: 700; margin-top: 1rem; }
    .primary { background: #A82B2D; color: #FEFEF3; width: 100%; }
    .ghost { background: #444; color: #FEFEF3; }
    .danger { background: #444; color: #ff6b6b; border: 1px solid #ff6b6b; width: 100%; margin-top: 10px; }
    #disp-sum-total { font-size: 2.5rem; color: #A82B2D; font-weight: 900; margin: 1rem 0; text-align: center;}
    #login-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; }
    .login-card { background: #2a2a2a; padding: 2rem; border-radius: 12px; border: 1px solid #A82B2D; width: 320px; text-align: center; }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Cruisin Craftsmen" class="logo">
  <h1>Mechanic Berekentool</h1>
</header>

<div class="wrap">
  <section class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
      <h2 style="margin:0;">Aankoop</h2>
      <label style="font-size: 0.9rem; color:#A82B2D; font-weight:bold; cursor:pointer;">
        <input type="checkbox" id="approve-extra"> ⚠️ MANAGER AKKOORD
      </label>
    </div>
    <div class="grid" id="container-aankoop">Database laden...</div>
  </section>

  <section class="card">
    <h2 style="margin-bottom: 1rem;">Recycling</h2>
    <div class="grid" id="container-recycling">Database laden...</div>
  </section>

  <section class="card">
    <div style="text-align:center;">
        <div style="font-size: 0.9rem; color:#bbb; text-transform:uppercase;">Totaal Uitbetalen</div>
        <div id="disp-sum-total">€ 0</div>
        <div style="display:flex; gap:10px;">
          <button class="ghost" style="flex:1;" id="btn-copy-total">📋 Kopiëren</button>
          <button class="ghost" style="flex:1;" onclick="location.reload()">🔄 Wissen</button>
        </div>
    </div>
  </section>

  <div style="text-align:center; margin-top: 2rem;">
    <button class="ghost" id="admin-status-btn" onclick="toggleLogin(true)" style="font-size:0.7rem; opacity:0.4;">🛠️ BEHEERDER LOGIN</button>
  </div>

  <section class="card" id="admin-panel" style="display:none; border: 2px solid #A82B2D;">
    <h2>⚙️ Prijzen Aanpassen</h2>
    <div id="price-edit-grid" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
    <button class="primary" id="btn-save-prices">💾 Prijzen Opslaan</button>
    <button class="danger" onclick="firebase.auth().signOut()">🚪 Uitloggen</button>
  </section>
</div>

<div id="login-overlay">
  <div class="login-card">
    <h3>Beheer</h3>
    <button class="primary" id="btn-auth" style="background:#4285F4;">🔵 Login met Google</button>
    <button class="ghost" onclick="toggleLogin(false)" style="width:100%; margin-top:10px;">Sluiten</button>
  </div>
</div>

<script>
// --- GEGEVENS ---
const EMAILJS_PUBLIC_KEY = "rOpe9bOgVCSBWRLXm"; 
const EMAILJS_SERVICE_ID = "service_fgawe2t";       
const EMAILJS_TEMPLATE_ID = "template_zlg3ne7"; 

const firebaseConfig = {
  apiKey: "AIzaSyBpCPp95sTmIokd4qQxARKAWxFJnKF6Efo",
  authDomain: "cruisin-craftsmen.firebaseapp.com",
  databaseURL: "https://cruisin-craftsmen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cruisin-craftsmen",
  storageBucket: "cruisin-craftsmen.firebasestorage.app",
  messagingSenderId: "169024473632",
  appId: "1:169024473632:web:628511fc7fafbbe6df8a45"
};

firebase.initializeApp(firebaseConfig);
emailjs.init(EMAILJS_PUBLIC_KEY);

const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const LABELS = { ijzer:"Ijzer", staal:"Staal", aluminium:"Aluminium", carparts:"Car parts", craftparts:"Craft parts", elektronischschroot:"Elek. Schroot", metaalschroot:"Metaalschroot", rubber:"Rubber", plastic:"Plastic", glas:"Glas", koper:"Koper", banden:"Banden", blikjes:"Blikjes", telefoons:"Telefoons", radios:"Radio's" };
const RESTRICTED = ["plastic", "glas", "koper", "elektronischschroot"];
let PRICES = {};

// AUTHENTICATIE
auth.onAuthStateChanged(user => {
    if (user) {
        const safeEmail = user.email.replace(/\./g, ',');
        db.ref('whitelist/' + safeEmail).on('value', (snap) => {
            if (snap.exists() && snap.val() === true) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-status-btn').textContent = "✅ BEHEER ACTIEF (" + user.displayName + ")";
                setupAdminGrid();
            } else {
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('admin-status-btn').textContent = "⏳ TOEGANG AFGEWACHT";
            }
        });
    } else {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('admin-status-btn').textContent = "🛠️ BEHEERDER LOGIN";
    }
});

document.getElementById('btn-auth').onclick = () => {
    auth.signInWithPopup(provider).then((result) => {
        const safeEmail = result.user.email.replace(/\./g, ',');
        db.ref('whitelist/' + safeEmail).once('value', (snap) => {
            if (!(snap.exists() && snap.val() === true)) {
                if(confirm("Geen toegang. Wil je een aanvraag sturen naar Joran?")) {
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        user_name: result.user.displayName,
                        user_email: result.user.email
                    }).then(() => alert("Aanvraag verzonden!")).catch(err => alert("Fout: " + err.text));
                }
            }
            toggleLogin(false);
        });
    });
};

// CALCULATOR LOGICA
db.ref('prices').on('value', (snap) => {
    PRICES = snap.val() || { aankoop: { ijzer:20 }, recycling: { banden:10 } };
    renderUI();
});

function renderUI() {
    ['aankoop', 'recycling'].forEach(sec => {
        const cont = document.getElementById(`container-${sec}`);
        if(!cont) return;
        let html = `<div class="head">Item</div><div class="head">Aantal</div><div class="head" style="text-align:right;">Totaal</div>`;
        for (let id in PRICES[sec]) {
            const isDisabled = RESTRICTED.includes(id) && !document.getElementById('approve-extra').checked;
            html += `<div><strong>${LABELS[id] || id}</strong><span class="price-label">€${PRICES[sec][id]}/st</span></div>
                     <div><input id="${id}" type="number" placeholder="0" oninput="updateSums()" ${isDisabled ? 'disabled' : ''}></div>
                     <div class="sub-total-cell" id="sub-${id}">€ 0</div>`;
        }
        cont.innerHTML = html;
    });
    updateSums();
}

function updateSums() {
    let grandTotal = 0;
    for (let sec in PRICES) {
        for (let id in PRICES[sec]) {
            const el = document.getElementById(id);
            if(el) {
                const sub = (parseInt(el.value) || 0) * PRICES[sec][id];
                document.getElementById(`sub-${id}`).textContent = "€ " + sub.toLocaleString('nl-NL');
                grandTotal += sub;
            }
        }
    }
    document.getElementById('disp-sum-total').textContent = "€ " + grandTotal.toLocaleString('nl-NL');
}

function setupAdminGrid() {
    const g = document.getElementById('price-edit-grid');
    g.innerHTML = "";
    for (let sec in PRICES) {
        for (let id in PRICES[sec]) {
            g.innerHTML += `<div style="padding:10px 0;">${LABELS[id] || id}</div><input type="number" class="adm-in" data-sec="${sec}" data-id="${id}" value="${PRICES[sec][id]}">`;
        }
    }
}

document.getElementById('btn-save-prices').onclick = () => {
    document.querySelectorAll('.adm-in').forEach(i => PRICES[i.dataset.sec][i.dataset.id] = parseInt(i.value) || 0);
    db.ref('prices').set(PRICES).then(() => alert("Opgeslagen!"));
};

function toggleLogin(s) { document.getElementById('login-overlay').style.display = s ? 'flex' : 'none'; }
document.getElementById('btn-copy-total').onclick = () => {
    const val = document.getElementById('disp-sum-total').textContent.replace('€ ', '').replace('.', '');
    navigator.clipboard.writeText(val);
    alert("Bedrag gekopieerd!");
};

document.addEventListener('change', (e) => {
  if (e.target.id === 'approve-extra') {
    renderUI(); // Herlaad UI om velden te activeren/deactiveren met nieuwe styles
  }
});
</script>
</body>
</html>
